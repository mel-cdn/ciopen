# Build system
[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

# Project metadata
[project]
name = "ciopen"
version = "0.0.4"
description = "Open CI pipelines from your current Git repository"
readme = { file = "README.md", content-type = "text/markdown" }
requires-python = ">=3.11"
authors = [{ name = "Mel Cadano" }]
dependencies = [
    "typer>=0.24.1"
]

# CLI entry points
[project.scripts]
ciopen = "ciopen.cli:app"

# Dev dependencies
[project.optional-dependencies]
dev = [
    "pytest==9.0.2",
    "pytest-cov==7.0.0",
    "pre-commit==4.5.1",
    "conventional-pre-commit==4.4.0",
]

# Semantic versioning
# We'll stay to experimental/patch for now until everything is good.
[tool.semantic_release]
branch = "main"
version_source = "tag"
upload_to_pypi = false
major_on_zero = true
changelog_file = "CHANGELOG.md"
default_bump = "patch"
commit_parser = "angular"

version_toml = [
    "pyproject.toml:project.version",
]

[tool.semantic_release.commit_parser_options]
# Disable major/minor bumps entirely; everything becomes patch (or no-release if you choose).
ignore_breaking_changes = true
major_tags = []
minor_tags = []
patch_tags = ["fix", "feat", "chore", "docs", "refactor", "perf", "style", "test", "ci", "build"]
