[project]
name = "ciopen"
version = "0.0.4"
description = "Open CI pipelines from your current Git repository"
readme = { file = "README.md", content-type = "text/markdown" }
requires-python = ">=3.11"
authors = [{ name = "Mel Cadano" }]
dependencies = ["typer>=0.24.1"]

[project.scripts]
ciopen = "ciopen.cli:app"



[project.optional-dependencies]
dev = [
    "pytest==9.0.2",
    "pytest-cov==7.0.0",
    "pre-commit==4.5.1",
    "conventional-pre-commit==4.4.0",
    "twine==6.2.0",
    "build==1.4.0",
]

[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"
