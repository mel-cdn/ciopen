name: PyPI Publish

on:
  push:
    tags:
      - "v*"

jobs:
  # ---------------------------------
  # Publish
  # ---------------------------------
  publish:
    name: PiPy Publish
    runs-on: ubuntu-latest
    environment:
      name: publish  # Will require manual approval if environment has protection rules
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Upload to PyPI
        run: twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
